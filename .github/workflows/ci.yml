name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Settings is env-driven and the real .env is gitignored. The
      # placeholder values in .env.example are valid types — pydantic can
      # parse them, and the test suite uses an in-memory SQLite via the
      # get_db override in tests/conftest.py, so DATABASE_URL is never
      # actually dialled.
      - name: Provide test .env
        run: cp .env.example .env

      - name: Run tests
        run: pytest -q
